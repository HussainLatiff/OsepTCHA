<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Demo Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Create an Account</h1>
            <p class="text-gray-500 text-sm">Join our secure platform today.</p>
        </div>

        <script>
            function handleRegister(e) {
                e.preventDefault();
                const tokenInput = document.getElementById('oseptcha-token');
                if (!tokenInput || !tokenInput.value) {
                    alert("⚠️ Access Denied: Please complete the OsepTCHA Security Challenge first!");
                    return;
                }
                alert("✅ Success! Account created securely.\n\nBackend captured Cryptographic Token:\n" + tokenInput.value);
            }
        </script>

        <form onsubmit="handleRegister(event)" class="space-y-6">

            <!-- Standard Inputs -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <!-- OsepTCHA Drop-In Integration -->
            <div class="py-4 border-t border-b border-gray-100 my-6 flex justify-center bg-gray-50 rounded-xl">
                <!-- Our script parses the sitekey automatically and mounts here! -->
                <script src="http://localhost:5173/src/widget.js?sitekey=84116ebe-525d-4df0-b326-18eb34781be3" async
                    defer></script>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                Register Securely
            </button>

            <p class="text-xs text-center text-gray-400 mt-4">Protected by OsepTCHA ZKP Infrastructure</p>
        </form>
    </div>

</body>

</html>
